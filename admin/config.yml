backend:
  name: github
  repo: Abudara25/voix-des-voyageurs
  branch: main
  # Projet OAuth déployé séparément sur Vercel (voir ACTUALITES-SETUP.md,
  # section "Mise en place technique"). auth_endpoint n'a pas besoin d'être
  # précisé : "auth" est la valeur par défaut de Decap CMS et correspond à
  # la route /auth de ce projet OAuth.
  base_url: https://voix-des-voyageurs-cms-oauth.vercel.app

publish_mode: simple

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "actualites"
    label: "Actualités"
    label_singular: "Actualité"
    folder: "data/actualites"
    create: true
    format: "json"
    extension: "json"
    identifier_field: "titre"
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image d'illustration", name: "image", widget: "image", required: false }
      - {
          label: "Lien YouTube",
          name: "youtube",
          widget: "string",
          required: false,
          hint: "Collez l'adresse de la vidéo (ex. https://www.youtube.com/watch?v=XXXXXXXXXXX ou https://youtu.be/XXXXXXXXXXX). Laissez vide si pas de vidéo.",
        }
      - { label: "Contenu", name: "body", widget: "markdown" }
